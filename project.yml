name: HribiVZepu
options:
  deploymentTarget:
    iOS: "26.0"
packages:
  HikeKit:
    path: HikeKit
targets:
  HribiVZepu:
    type: application
    platform: iOS
    sources: [App]
    dependencies:
      - package: HikeKit
      - target: ShareExtension
    entitlements:
      path: App/HribiVZepu.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.markos.hribivzepu
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Hribi v žepu
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markos.hribivzepu
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ShareExtension:
    type: app-extension
    platform: iOS
    sources: [ShareExtension]
    dependencies:
      - package: HikeKit
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.markos.hribivzepu
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Hribi v žepu
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.markos.hribivzepu.share
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
